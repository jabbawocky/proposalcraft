name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Smoke test — server starts
        run: |
          timeout 5 node dist/index.js || true
          node dist/index.js &
          PID=$!
          sleep 2
          kill $PID 2>/dev/null || true
          echo "Smoke test passed"
